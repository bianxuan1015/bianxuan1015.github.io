<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bian Xuan | Global Medical R&D</title>
<style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
           font-family: "Microsoft Yahei", sans-serif;
       }
       body {
           background: linear-gradient(135deg, #0a2c2c, #0f3838);
           color: #ffffff;
           min-height: 100vh;
       }
       /* 顶部导航栏 */
       header {
           width: 100%;
           padding: 24px 40px;
           display: flex;
           justify-content: space-between;
           align-items: center;
           position: fixed;
           top: 0;
           left: 0;
           z-index: 99;
       }
       .logo-header {
           font-size: 34px;
           color: #f9d14a;
           font-weight: bold;
       }
       .nav-list {
           display: flex;
           gap: 32px;
           align-items: center;
       }
       .nav-list a {
           color: #fff;
           text-decoration: none;
           font-size: 16px;
       }
       /* 右上角按钮样式缩小防遮挡 */
       .lang-btn, .contact-btn {
           padding: 5px 11px !important;
           font-size: 13px !important;
           margin-left: 8px !important;
           border-radius: 20px;
           border: 1px solid #f9d14a;
           color: #f9d14a;
           background: transparent;
           cursor: pointer;
       }
       .lang-btn {
           background: #f9d14a;
           color: #000;
       }
       /* 首页主体区域，下移避开导航遮挡 */
       .hero-section {
           padding: 0 40px;
           padding-top: 160px;
           max-width: 1200px;
       }
       .hero-section h1 {
           font-size: 54px;
           margin-bottom: 18px;
           color: #fff;
       }
       .title-desc {
           font-size: 22px;
           color: #f9d14a;
           margin-bottom: 42px;
       }
       .tag-row {
           display: flex;
           flex-wrap: wrap;
           gap: 16px;
           margin-bottom: 22px;
       }
       .tag {
           border: 1px solid #f9d14a;
           color: #f9d14a;
           padding: 9px 22px;
           border-radius: 999px;
           font-size: 16px;
       }
       .intro-text {
           margin-top: 44px;
           font-size: 18px;
           line-height: 1.85;
           color: #eeeeee;
           max-width: 920px;
       }
</style>
</head>
<body>
<!-- 顶部导航 -->
<header>
<div class="logo-header">BIANXUAN.MED</div>
<div class="nav-list">
<a href="#">首页</a>

<a href="#">教育资质</a>

</div>
</header>
<!-- 首页主内容（已移除证件照全部代码） -->
<section class="hero-section">
<h1>学术顾问 边璇</h1>
<p class="title-desc">通用医疗生命科学事业部大中华区 医学研发总监</p>
<div class="tag-row">
<span class="tag">医学&管理双博士</span>
<span class="tag">牛津大学博士后</span>
<span class="tag">英国皇家医学会会士</span>

<span class="tag">全球临床研发负责人</span>
</div>
<div class="tag-row">

<span class="tag">FRSM</span>
<span class="tag">Medical AI Expert</span>
<span class="tag">Global Clinical Lead</span>
</div>
<div class="intro-text">
<p>十余年跨国药企、医疗设备龙头医学事务全链路管理经验，深耕全球新药临床研发、AI医疗影像产业化、跨国学术资源运营、数字化医疗创新四大赛道，完整履历、项目成果与学术资质详见下方对应板块。</p>
</div>
</section>
</body>
</html>
